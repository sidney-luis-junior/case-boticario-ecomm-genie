# Arquivo de Metadados para o E-comm Genie
# Modelo estruturado para consumo de LLMs, definindo entidades e regras de cálculo seguras.

model:
  name: modelo_vendas_ecomm
  description: "Fonte única da verdade para métricas de vendas do e-commerce do Grupo Boticário."
  target_table: fato_vendas_semantica

  # -------------------------------------------------------------------------
  # DIMENSÕES: Campos usados para filtrar, agrupar e quebrar dados
  # -------------------------------------------------------------------------
  dimensions:
    - name: data_venda
      column: dt_venda
      type: date
      description: "Data em que o pedido foi realizado. Usado para comparações de tempo (ex: YoY, mês passado, ontem)."

    - name: ciclo_venda
      column: des_ciclo
      type: string
      description: "Ciclo comercial/marketing em que a venda ocorreu (ex: REGULAR, MAES, NAMORADOS)."

    - name: marca
      column: marca_ind
      type: string
      description: "Marca do produto vendido (ex: MARCA-14, Boticário, Eudora)."

    - name: categoria_produto
      column: categoria_final_nivel1
      type: string
      description: "Categoria principal do produto (ex: Perfumaria, Maquiagem)."

    - name: sku_produto
      column: cod_material
      type: string
      description: "Código SKU individual do produto."

    - name: formato_venda
      column: apresentacao_combo
      type: string
      description: "Classifica se o item foi vendido como 'INDIVIDUAL' ou 'COMBO/KIT'."

    - name: regiao_geografica
      column: regiao
      type: string
      description: "Região do Brasil onde o pedido foi entregue (ex: NORDESTE, SUL)."

    - name: canal_de_trafego
      column: fonte_de_trafego_nivel_1
      type: string
      description: "Origem primária do tráfego que gerou a venda (ex: Google Orgânico, Buscadores de IA)."

    - name: midia_canal
      column: des_midia_canal
      type: string
      description: "Canal específico de mídia que originou a venda (ex: ChatGPT, Perplexity, Facebook)."

    - name: nome_cupom
      column: des_cupom
      type: string
      description: "Cupom de desconto aplicado na compra."

    - name: venda_valida
      column: flg_venda_valida
      type: boolean
      description: "Filtro obrigatório de negócio. 1 = Pedido Aprovado e Faturado. 0 = Cancelado ou não faturado."
      
    # GOVERNANÇA DE DADOS: Ocultando CPF por segurança
    - name: cliente_hash
      column: cpf_hash
      type: string
      description: "Hash único de identificação do cliente. O CPF real não é exposto ao LLM."

    # -------------------------------------------------------------------------
    # ANTECIPANDO DEMANDAS DO E-COMMERCE
    # -------------------------------------------------------------------------
    
    # Justificativa: A diretoria regional frequentemente pede granularidade. "Região" é muito amplo.
    - name: estado_uf
      column: uf
      type: string
      description: "Unidade Federativa (Estado) da entrega. Útil para análises tributárias ou de malha logística."
      
    - name: cidade
      column: des_cidade
      type: string
      description: "Cidade da entrega. Permite fatiar a performance por municípios específicos."

    # Justificativa: Entender o horário de pico é essencial para o time de TI escalar servidores e Mídia alocar budget.
    - name: hora_da_venda
      type: expression
      sql: "EXTRACT(HOUR FROM dt_hora_venda)"
      description: "Hora exata (0-23) da transação. Útil para descobrir horários de pico no site."

    # Justificativa: O Boticário é forte no O2O (Online to Offline), então achei interessante trazer também essa dimenção para auxiliar.
    - name: modalidade_logistica
      type: expression
      sql: "CASE WHEN flg_pedidos_pickup = 1 THEN 'Retirada em Loja' WHEN flg_pedidos_cd = 1 THEN 'Entrega CD' ELSE 'Outros' END"
      description: "Indica se o pedido foi omnicanal (Retirada na Loja / Click & Collect) ou entrega tradicional."


  # -------------------------------------------------------------------------
  # MÉTRICAS: Cálculos e agregações oficiais da companhia
  # -------------------------------------------------------------------------
  metrics:
    - name: receita_faturada
      type: sum
      sql: vlr_receita_faturada
      description: "Total de receita líquida (faturamento real)."

    - name: volume_pedidos
      type: count_distinct
      sql: cod_pedido
      description: "Quantidade de pedidos únicos realizados."

    - name: ticket_medio
      type: expression
      sql: "SUM(vlr_receita_faturada) / NULLIF(COUNT(DISTINCT cod_pedido), 0)"
      description: "Ticket médio financeiro por pedido."

    - name: valor_desconto
      type: sum
      sql: vlr_venda_desconto
      description: "Total de desconto concedido aos clientes."

    # -------------------------------------------------------------------------
    # ANTECIPANDO DEMANDAS DO E-COMMERCE
    # -------------------------------------------------------------------------
    
    # Justificativa: Saber a receita faturada é bom, mas o time Financeiro também pode querer avaliar o "bruto x líquido".
    - name: receita_bruta
      type: sum
      sql: vlr_receita_bruta_omni
      description: "Receita bruta capturada antes de impostos, rupturas ou devoluções."

    # Justificativa: O time de Promoções precisa saber quão "barato" o e-commerce está sendo vendido.
    - name: taxa_de_desconto_percentual
      type: expression
      sql: "SUM(vlr_venda_desconto) / NULLIF(SUM(vlr_receita_bruta_omni), 0)"
      description: "Mede a agressividade promocional: qual a porcentagem de desconto frente à receita bruta."

    # Justificativa: Operações e Fraude monitoram isso diariamente.
    - name: pedidos_cancelados
      type: expression
      sql: "COUNT(DISTINCT CASE WHEN status_oms LIKE '%Cancelado%' THEN cod_pedido END)"
      description: "Volume de pedidos que sofreram cancelamento no sistema de origem (OMS)."
